<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>VIP 计算器</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
    }
    .container {
      background: rgba(255,255,255,0.96);
      border-radius: 24px;
      padding: 24px;
      box-shadow: 0 20px 60px rgba(0,0,0,0.3);
      width: 360px;
    }
    .header {
      text-align: center;
      margin-bottom: 12px;
    }
    .header h1 { font-size: 20px; color: #333; }
    .header .sub { font-size: 12px; color: #999; }
    .display {
      background: #f4f6f8;
      border-radius: 16px;
      padding: 16px 20px;
      text-align: right;
      min-height: 80px;
      margin-bottom: 12px;
      display: flex;
      flex-direction: column;
      justify-content: flex-end;
      word-break: break-all;
    }
    .display .expr { font-size: 16px; color: #888; min-height: 22px; }
    .display .result { font-size: 36px; font-weight: 700; color: #222; transition: color 0.2s; }
    .display .result.error { color: #d63031; }

    .btn-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      margin-bottom: 14px;
    }
    .btn-grid button {
      padding: 16px 0;
      font-size: 22px;
      font-weight: 600;
      border: none;
      border-radius: 14px;
      cursor: pointer;
      transition: all 0.1s;
    }
    .btn-grid button:active { transform: scale(0.93); }
    .btn-num { background: #f0f2f5; color: #222; }
    .btn-num:hover { background: #e4e7ec; }
    .btn-zero { grid-column: span 2; }
    .btn-op { background: #667eea; color: #fff; }
    .btn-op:hover { background: #5a6fd6; }
    .btn-vip { background: #f5af19; color: #fff; position: relative; }
    .btn-vip:hover { background: #e09e0f; }
    .btn-vip::after {
      content: "VIP";
      position: absolute;
      top: -2px; right: -2px;
      background: #f12711;
      color: #fff;
      font-size: 8px;
      padding: 1px 5px;
      border-radius: 6px;
    }
    .btn-vip.unlocked { background: #27ae60; }
    .btn-vip.unlocked::after { background: #27ae60; content: "\2713"; }
    .btn-eq { background: #2d3436; color: #fff; }
    .btn-eq:hover { background: #1e272e; }
    .btn-clr { background: #d63031; color: #fff; }
    .btn-clr:hover { background: #c0392b; }

    /* 登录区域 */
    .auth-section {
      border-top: 1px solid #eee;
      padding-top: 12px;
    }
    .user-bar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 8px;
      font-size: 13px;
    }
    .user-bar .username { color: #667eea; font-weight: 600; }
    .user-bar .logout-btn {
      background: none;
      border: 1px solid #ddd;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
      color: #888;
    }
    .user-bar .logout-btn:hover { background: #f5f5f5; }

    .auth-tabs {
      display: flex;
      gap: 0;
      margin-bottom: 10px;
    }
    .auth-tabs button {
      flex: 1;
      padding: 8px;
      border: 2px solid #e9ecef;
      border-radius: 0;
      background: #f8f9fa;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      color: #888;
      transition: all 0.15s;
    }
    .auth-tabs button:first-child { border-radius: 8px 0 0 8px; }
    .auth-tabs button:last-child { border-radius: 0 8px 8px 0; }
    .auth-tabs button.active {
      background: #667eea;
      color: #fff;
      border-color: #667eea;
    }

    .auth-form {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 10px;
    }
    .auth-form input {
      padding: 10px 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 14px;
      outline: none;
    }
    .auth-form input:focus { border-color: #667eea; }
    .auth-form button {
      padding: 10px;
      background: #667eea;
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.15s;
    }
    .auth-form button:hover { background: #5a6fd6; }

    .vip-status {
      text-align: center;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .vip-status.active { color: #27ae60; font-weight: 600; }
    .vip-status.inactive { color: #888; }
    .vip-badge {
      display: inline-block;
      background: linear-gradient(135deg, #f5af19, #f12711);
      color: #fff;
      padding: 2px 10px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }
    .redeem-row {
      display: flex;
      gap: 6px;
    }
    .redeem-row input {
      flex: 1;
      padding: 8px 12px;
      border: 2px solid #e9ecef;
      border-radius: 8px;
      font-size: 13px;
      outline: none;
    }
    .redeem-row input:focus { border-color: #f5af19; }
    .redeem-row button {
      padding: 8px 14px;
      background: linear-gradient(135deg, #f5af19, #f12711);
      color: #fff;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 700;
      white-space: nowrap;
      transition: all 0.15s;
    }
    .redeem-row button:hover { transform: translateY(-1px); }
    .redeem-row button:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    .toast {
      position: fixed;
      top: 20px;
      left: 50%;
      transform: translateX(-50%);
      color: #fff;
      padding: 10px 22px;
      border-radius: 10px;
      font-size: 13px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
      z-index: 999;
    }
    .toast.show { opacity: 1; }
  </style>
</head>
<body>

<div class="toast" id="toast"></div>

<div class="container">
  <div class="header">
    <h1>🧮 计算器</h1>
    <div class="sub">加减免费 · 乘除需会员</div>
  </div>

  <div class="display">
    <div class="expr" id="displayExpr"></div>
    <div class="result" id="displayResult">0</div>
  </div>

  <div class="btn-grid">
    <button class="btn-clr" data-action="clear">C</button>
    <button class="btn-clr" data-action="backspace">&#9003;</button>
    <button class="btn-vip" data-op="*">&#215;</button>
    <button class="btn-vip" data-op="/">&#247;</button>
    <button class="btn-num" data-num="7">7</button>
    <button class="btn-num" data-num="8">8</button>
    <button class="btn-num" data-num="9">9</button>
    <button class="btn-op" data-op="+">+</button>
    <button class="btn-num" data-num="4">4</button>
    <button class="btn-num" data-num="5">5</button>
    <button class="btn-num" data-num="6">6</button>
    <button class="btn-op" data-op="-">&#8722;</button>
    <button class="btn-num" data-num="1">1</button>
    <button class="btn-num" data-num="2">2</button>
    <button class="btn-num" data-num="3">3</button>
    <button class="btn-eq" data-action="calc">=</button>
    <button class="btn-num btn-zero" data-num="0">0</button>
    <button class="btn-num" data-num=".">.</button>
  </div>

  <div class="auth-section">
    <!-- 未登录：登录/注册表单 -->
    <div id="authPanel">
      <div class="auth-tabs">
        <button id="tabLogin" class="active">登录</button>
        <button id="tabRegister">注册</button>
      </div>
      <div class="auth-form" id="authForm">
        <input type="text" id="authUser" placeholder="用户名" autocomplete="off" />
        <input type="password" id="authPass" placeholder="密码" />
        <button id="authBtn">登录</button>
      </div>
    </div>

    <!-- 已登录：会员与兑换区域 -->
    <div id="userPanel" style="display:none;">
      <div class="user-bar">
        <span>👤 <span class="username" id="displayUser"></span></span>
        <button class="logout-btn" id="logoutBtn">退出登录</button>
      </div>
      <div class="vip-status inactive" id="vipStatus">
        &#128142; 当前：普通用户（乘除需会员）
      </div>
      <div class="redeem-row">
        <input type="text" id="redeemInput" placeholder="输入兑换码" />
        <button id="redeemBtn">兑换会员</button>
      </div>
    </div>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
